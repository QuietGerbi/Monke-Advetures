name: Build Monke Adventures

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  build:
    name: Build for ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false # Чтобы падение на одной ОС не отменяло остальные
      matrix:
        os: [windows-latest, macos-latest, ubuntu-latest]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'gradle'

      # WiX Toolset нужен jpackage только на Windows для создания exe/msi
      - name: Install WiX (Windows only)
        if: runner.os == 'Windows'
        run: dotnet tool install --global WiX

      - name: Grant execute permission for gradlew
        if: runner.os != 'Windows'
        run: chmod +x gradlew

      - name: Build Fat JAR
        # Используем shell: bash везде для единообразия вызова gradlew
        shell: bash
        run: ./gradlew fatJar

      - name: Package with jpackage
        shell: bash
        run: |
          mkdir -p dist
          # Ищем JAR, заканчивающийся на all.jar
          JAR_PATH=$(find build/libs -name "*all.jar" | head -n 1)
          
          if [ -z "$JAR_PATH" ]; then
            echo "Error: Could not find Fat JAR in build/libs/"
            ls -R build/libs/ # Дамп содержимого для отладки, если не нашел
            exit 1
          fi
          
          JAR_NAME=$(basename "$JAR_PATH")
          echo "Found JAR: $JAR_NAME"

          # Базовая команда jpackage
          jpackage \
            --input build/libs \
            --name "MonkeAdventures" \
            --main-jar "$JAR_NAME" \
            --main-class ru.nsu.ccfit.alarkhipov.monkeadventures.Main \
            --dest dist \
            --vendor "Alarkhipov" \
            --app-version "1.0.0" \
            --verbose

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: MonkeAdventures-${{ matrix.os }}
          path: dist/
