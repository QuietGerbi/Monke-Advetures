name: Build Monke Adventures

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch: # Позволяет запускать сборку вручную

jobs:
  build:
    name: Build for ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest, macos-latest, ubuntu-latest]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'gradle'

      - name: Grant execute permission for Linux/macOS
        if: runner.os != 'Windows'
        run: chmod +x gradlew

      - name: Build Fat JAR
        shell: bash
        run: |
          if [ "$RUNNER_OS" == "Windows" ]; then
            ./gradlew.bat fatJar --stacktrace
          else
            ./gradlew fatJar --stacktrace
          fi

      - name: Prepare jpackage input (Isolate JAR)
        shell: bash
        run: |
          mkdir -p jpackage-input
          # Ищем fat jar (обычно содержит 'all' в названии) и копируем его в чистую папку
          find build/libs -type f -name "*all.jar" -exec cp {} jpackage-input/ \; || find build/libs -type f -name "*.jar" -exec cp {} jpackage-input/ \;
          echo "Содержимое папки для jpackage:"
          ls -la jpackage-input/

      - name: Package with jpackage
        shell: bash
        run: |
          JAR_NAME=$(ls jpackage-input | head -n 1)
          echo "Using JAR: $JAR_NAME"
          
          if [ -z "$JAR_NAME" ]; then
            echo "Ошибка: JAR не найден!"
            exit 1
          fi

          mkdir -p dist

          # Параметр --java-options "-Dfile.encoding=UTF-8" лечит кракозябры
          jpackage \
            --type app-image \
            --input jpackage-input \
            --name "MonkeAdventures" \
            --main-jar "$JAR_NAME" \
            --main-class ru.nsu.ccfit.alarkhipov.monkeadventures.Main \
            --dest dist \
            --vendor "Alarkhipov" \
            --app-version "1.0.0" \
            --java-options "-Dfile.encoding=UTF-8" \
            --verbose

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: MonkeAdventures-${{ matrix.os }}
          path: dist/
